<IfModule mod_headers.c>
  # Long cache for static assets (hashed bundles, images, fonts)
  <FilesMatch "\.(?:js|mjs|css|png|jpg|jpeg|svg|gif|webp|ico|woff2?)$">
    Header set Cache-Control "public, max-age=31536000, immutable"
  </FilesMatch>

  # Always refresh app shell + service worker control files
  <FilesMatch "^(?:index\.html|sw\.js|registerSW\.js|manifest\.webmanifest)$">
    Header set Cache-Control "no-cache, no-store, must-revalidate"
    Header set Pragma "no-cache"
    Header set Expires "0"
  </FilesMatch>
</IfModule>
